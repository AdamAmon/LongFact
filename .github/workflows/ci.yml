name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.8, 3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (reproducible)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # ensure CI tools are available for checks
          pip install ruff black pytest
      - name: Run compileall (repo only)
        run: python ./.github/ci/compile_repo.py
      - name: Run smoke test (Linux)
        if: runner.os != 'Windows'
        run: bash ./.github/ci/model_qa_smoke.sh
      - name: Run smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/ci/model_qa_smoke.ps1
      - name: Code style checks
        run: |
          black --check . || true
          ruff check . || true
        shell: bash
      - name: Run tests (Linux)
        if: runner.os != 'Windows'
        run: pytest -q
        shell: bash

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest -q
        shell: pwsh
